<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jukebox Pro - Hardcoded AdBlock</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #050505; --accent: #00ff88; --text: #ffffff; --dim: #666; --danger: #ff4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        #host-view { display: grid; grid-template-columns: 1fr 400px; height: 100vh; }
        .video-container { background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        
        /* ใช้ Iframe แบบพิเศษดึงจาก youtube-nocookie */
        #player-frame { width: 100%; height: 100%; border: none; }
        
        .controls-bar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 12px 25px; border-radius: 40px; display: flex; align-items: center; gap: 15px; width: 85%; backdrop-filter: blur(15px); border: 1px solid #222; z-index: 10; }
        .sidebar { background: #080808; border-left: 1px solid #151515; padding: 30px; overflow-y: auto; text-align: center; }
        .btn-minimal { background: rgba(255,255,255,0.03); border: 1px solid #222; color: #fff; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 11px; width: 100%; transition: 0.3s; }
        .btn-minimal:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <div id="setup" class="container" style="text-align: center; padding-top: 100px;">
        <h1 style="letter-spacing: 12px; color: var(--accent);">JUKEBOX</h1>
        <button class="btn-minimal" onclick="initHost()" style="max-width: 200px;">CREATE HOST</button>
    </div>

    <div id="host-view" class="hidden">
        <div class="video-container">
            <iframe id="player-frame" src="" allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>
            <div class="controls-bar">
                <div style="font-size: 11px; color: var(--accent);">ENCRYPTED PLAYBACK (NO ADS)</div>
                <div style="flex: 1;"></div>
                <button class="btn-minimal" style="width:auto; padding:5px 15px;" onclick="skip()">SKIP ⏭️</button>
            </div>
        </div>
        <div class="sidebar">
            <div id="host-pin" style="font-size: 48px; font-weight: 900; color: var(--accent);">----</div>
            <div id="qrcode" style="background:#fff; padding:10px; border-radius:8px; display: inline-block; margin-bottom: 30px;"></div>
            <div id="host-q"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUFEmoyZKyiaiPekaw-gc-B5M5cgtW_WE",
            authDomain: "songplayer-c1058.firebaseapp.com",
            databaseURL: "https://songplayer-c1058-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let CURRENT_ROOM = "", queue = [];

        function initHost() {
            CURRENT_ROOM = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('host-view').classList.remove('hidden');
            document.getElementById('host-pin').innerText = CURRENT_ROOM;
            new QRCode(document.getElementById("qrcode"), { text: window.location.href + "?room=" + CURRENT_ROOM, width: 150, height: 150 });
            startSync();
        }

        function startSync() {
            db.ref('rooms/'+CURRENT_ROOM+'/queue').on('value', s => {
                const d = s.val(); 
                const newQueue = d ? Object.entries(d).map(([k, v]) => ({ k, ...v })) : [];
                if (newQueue.length > 0 && (queue.length === 0 || newQueue[0].vid !== queue[0].vid)) {
                    // ใช้ URL แบบพิเศษ บล็อกโฆษณาตั้งแต่ต้นทาง
                    document.getElementById('player-frame').src = `https://www.youtube-nocookie.com/embed/${newQueue[0].vid}?autoplay=1&controls=1&modestbranding=1&rel=0&iv_load_policy=3`;
                }
                queue = newQueue;
                renderQueues();
            });
        }

        function renderQueues() {
            document.getElementById('host-q').innerHTML = queue.slice(1).map(item => `
                <div style="margin-bottom:10px; font-size:11px;">${item.title}</div>
            `).join('');
        }

        function skip() { if(queue.length > 0) db.ref('rooms/'+CURRENT_ROOM+'/queue/'+queue[0].k).remove(); }
    </script>
</body>
</html>
