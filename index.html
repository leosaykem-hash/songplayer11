<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jukebox Pro - Ultra Ad-Free</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --bg: #050505; --accent: #00ff88; --text: #ffffff; --dim: #666; --card: #111; --danger: #ff4444; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        .hidden { display: none !important; }
        .container { max-width: 400px; margin: 0 auto; padding: 20px; text-align: center; min-height: 100vh; }
        #host-view { display: grid; grid-template-columns: 1fr 400px; height: 100vh; }
        .video-container { background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        #player { width: 100%; height: 80%; pointer-events: none; }
        .controls-bar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 12px 25px; border-radius: 40px; display: flex; align-items: center; gap: 15px; width: 85%; backdrop-filter: blur(15px); border: 1px solid #222; z-index: 10; }
        .sidebar { background: #080808; border-left: 1px solid #151515; padding: 30px; overflow-y: auto; text-align: center; }
        .btn-minimal { background: rgba(255,255,255,0.03); border: 1px solid #222; color: #fff; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 11px; width: 100%; transition: 0.3s; }
        .btn-minimal:hover { border-color: var(--accent); color: var(--accent); }
        .input-minimal { width: 100%; padding: 14px; background: #0a0a0a; border: 1px solid #222; color: #fff; border-radius: 12px; margin-bottom: 15px; text-align: center; outline: none; }
        .q-item { display: flex; align-items: center; gap: 12px; background: #111; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #1a1a1a; }
        .q-item img { width: 45px; border-radius: 5px; }
        .q-title { font-size: 11px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left; }
        #g-cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 20px; margin-bottom: 20px; }
        .progress-container { width: 100%; background: #222; height: 4px; border-radius: 2px; margin: 15px 0; }
        #progress-bar { background: var(--accent); height: 100%; width: 0%; border-radius: 2px; }
        .seek-slider { flex: 1; accent-color: var(--accent); cursor: pointer; }
        .volume-slider { width: 70px; accent-color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

    <div id="setup" class="container">
        <h1 style="letter-spacing: 12px; font-weight: 200; margin-bottom: 50px; color: var(--accent);">JUKEBOX</h1>
        <div id="main-actions">
            <button class="btn-minimal" onclick="initHost()">CREATE HOST</button>
            <button class="btn-minimal" style="margin-top: 15px;" onclick="showJoin()">JOIN SESSION</button>
        </div>
        <div id="join-box" class="hidden">
            <input type="text" id="pin-in" maxlength="4" placeholder="ROOM PIN" class="input-minimal">
            <button class="btn-minimal" onclick="initGuest()">CONNECT</button>
        </div>
    </div>

    <div id="host-view" class="hidden">
        <div class="video-container">
            <div id="player"></div>
            <div class="controls-bar">
                <button class="btn-minimal" style="width:auto; padding:5px 15px;" onclick="togglePlay()" id="play-btn">⏸️</button>
                <div id="host-time" style="font-size: 11px; min-width: 90px;">0:00 / 0:00</div>
                <input type="range" id="seek-slider" class="seek-slider" value="0" step="0.1">
                <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="100">
            </div>
        </div>
        <div class="sidebar">
            <div style="margin-bottom: 30px;">
                <small style="color:var(--dim)">ROOM PIN</small>
                <div id="host-pin" style="font-size: 48px; font-weight: 900; color: var(--accent);">----</div>
            </div>
            <div id="qrcode" style="background:#fff; padding:10px; border-radius:8px; display: inline-block; margin-bottom: 30px;"></div>
            <p style="font-size: 10px; color: var(--dim); text-align: left; letter-spacing: 2px;">UPCOMING QUEUE</p>
            <div id="host-q"></div>
            <button class="btn-minimal" onclick="skip()" style="margin-top:30px; color: var(--danger); border-color: var(--danger);">SKIP SONG ⏭️</button>
        </div>
    </div>

    <div id="guest-view" class="hidden container">
        <img id="g-cover" src="">
        <h3 id="g-title" style="text-align: left; margin: 0; font-size: 18px;">Waiting...</h3>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <input type="text" id="song-url" placeholder="Paste YouTube Link" class="input-minimal">
        <button class="btn-minimal" onclick="addSong()">ADD TO QUEUE</button>
        <div id="guest-q" style="margin-top: 20px;"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUFEmoyZKyiaiPekaw-gc-B5M5cgtW_WE",
            authDomain: "songplayer-c1058.firebaseapp.com",
            projectId: "songplayer-c1058",
            databaseURL: "https://songplayer-c1058-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let MY_ID = localStorage.getItem('jukebox_uid') || 'u' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('jukebox_uid', MY_ID);
        let CURRENT_ROOM = "", queue = [], ytPlayer;

        function initHost() {
            CURRENT_ROOM = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('host-view').classList.remove('hidden');
            document.getElementById('host-pin').innerText = CURRENT_ROOM;
            new QRCode(document.getElementById("qrcode"), { text: window.location.href.split('?')[0] + "?room=" + CURRENT_ROOM, width: 180, height: 180 });
            
            ytPlayer = new YT.Player('player', {
                height: '100%', width: '100%',
                playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0 },
                events: { 
                    'onStateChange': (e) => { 
                        if(e.data == YT.PlayerState.ENDED) skip();
                        // สั่งเช็คโฆษณาเมื่อสถานะเปลี่ยน
                        checkAds();
                    },
                    'onReady': () => { setInterval(checkAds, 500); } // เช็คโฆษณาทุก 0.5 วินาที
                }
            });
            setInterval(syncProgress, 1000);
            startSync(true);
        }

        // ฟังก์ชันลับสำหรับ Skip โฆษณาอัตโนมัติ
        function checkAds() {
            if(ytPlayer && ytPlayer.getAdState && ytPlayer.getAdState() === 1) {
                ytPlayer.setVolume(0); // ปิดเสียงโฆษณา
                ytPlayer.seekTo(ytPlayer.getDuration()); // เลื่อนไปจบโฆษณาทันที
            } else if (ytPlayer) {
                ytPlayer.setVolume(document.getElementById('volume-slider').value);
            }
        }

        function syncProgress() {
            if(ytPlayer && ytPlayer.getCurrentTime) {
                const cur = ytPlayer.getCurrentTime(); const dur = ytPlayer.getDuration();
                document.getElementById('host-time').innerText = `${formatTime(cur)} / ${formatTime(dur)}`;
                document.getElementById('seek-slider').value = (cur/dur)*100 || 0;
                db.ref('rooms/'+CURRENT_ROOM+'/playing').update({ vid: queue[0]?.vid, title: queue[0]?.title, cur, dur });
            }
        }

        function startSync(isHost) {
            db.ref('rooms/'+CURRENT_ROOM+'/queue').on('value', s => {
                const d = s.val(); queue = d ? Object.entries(d).map(([k, v]) => ({ k, ...v })) : [];
                renderQueues(isHost);
                if(isHost && ytPlayer && ytPlayer.getPlayerState && ytPlayer.getPlayerState() != 1 && queue.length > 0) playNext();
            });

            db.ref('rooms/'+CURRENT_ROOM+'/playing').on('value', s => {
                const d = s.val(); if(!d || isHost) return;
                document.getElementById('g-title').innerText = d.title;
                document.getElementById('g-cover').src = `https://img.youtube.com/vi/${d.vid}/maxresdefault.jpg`;
                document.getElementById('progress-bar').style.width = (d.cur/d.dur*100) + "%";
            });
        }

        function renderQueues(isHost) {
            const qHTML = queue.slice(1).map(item => `
                <div class="q-item"><img src="https://img.youtube.com/vi/${item.vid}/mqdefault.jpg"><div class="q-title">${item.title}</div></div>
            `).join('');
            document.getElementById(isHost ? 'host-q' : 'guest-q').innerHTML = qHTML;
        }

        function playNext() { if(queue.length > 0) ytPlayer.loadVideoById(queue[0].vid); }
        function skip() { if(queue.length > 0) db.ref('rooms/'+CURRENT_ROOM+'/queue/'+queue[0].k).remove(); playNext(); }
        async function addSong() {
            const v = document.getElementById('song-url').value;
            const id = v.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if(id) {
                const r = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`);
                const d = await r.json();
                db.ref('rooms/'+CURRENT_ROOM+'/queue').push({ vid: id, title: d.title, uid: MY_ID });
                document.getElementById('song-url').value = "";
            }
        }

        function togglePlay() { const s = ytPlayer.getPlayerState(); if(s==1){ytPlayer.pauseVideo(); document.getElementById('play-btn').innerText="▶️";}else{ytPlayer.playVideo(); document.getElementById('play-btn').innerText="⏸️";} }
        function formatTime(s) { const m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0'+sec:sec}`; }
        function showJoin() { document.getElementById('main-actions').classList.add('hidden'); document.getElementById('join-box').classList.remove('hidden'); }
        function initGuest() { CURRENT_ROOM = document.getElementById('pin-in').value; document.getElementById('setup').classList.add('hidden'); document.getElementById('guest-view').classList.remove('hidden'); startSync(false); }
        document.getElementById('volume-slider').oninput = (e) => ytPlayer.setVolume(e.target.value);
        document.getElementById('seek-slider').oninput = (e) => ytPlayer.seekTo((e.target.value/100)*ytPlayer.getDuration());
    </script>
</body>
</html>
