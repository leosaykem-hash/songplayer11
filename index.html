<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jukebox Pro - AdShield Integrated</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #050505; --accent: #00ff88; --text: #ffffff; --dim: #666; --card: #111; --danger: #ff4444; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        .hidden { display: none !important; }
        .container { max-width: 400px; margin: 0 auto; padding: 20px; text-align: center; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        
        /* Host Layout */
        #host-view { display: grid; grid-template-columns: 1fr 400px; height: 100vh; }
        .video-container { background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        #player-frame { width: 100%; height: 100%; border: none; }
        
        .controls-bar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 12px 25px; border-radius: 40px; display: flex; align-items: center; gap: 15px; width: 85%; backdrop-filter: blur(15px); border: 1px solid #222; z-index: 10; }
        
        .sidebar { background: #080808; border-left: 1px solid #151515; padding: 30px; overflow-y: auto; text-align: center; }
        .btn-minimal { background: rgba(255,255,255,0.03); border: 1px solid #222; color: #fff; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 11px; width: 100%; transition: 0.3s; margin-bottom: 10px; }
        .btn-minimal:hover { border-color: var(--accent); color: var(--accent); }
        .input-minimal { width: 100%; padding: 14px; background: #0a0a0a; border: 1px solid #222; color: #fff; border-radius: 12px; margin-bottom: 15px; text-align: center; outline: none; }
        
        /* Queue Item UI */
        .q-item { display: flex; align-items: center; gap: 12px; background: #111; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #1a1a1a; }
        .q-item img { width: 45px; border-radius: 5px; }
        .q-title { font-size: 11px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left; }
    </style>
</head>
<body>

    <div id="setup" class="container">
        <h1 style="letter-spacing: 12px; font-weight: 200; margin-bottom: 50px; color: var(--accent);">JUKEBOX</h1>
        <div id="main-actions">
            <button class="btn-minimal" onclick="initHost()">CREATE HOST</button>
            <button class="btn-minimal" onclick="showJoin()">JOIN SESSION</button>
        </div>
        <div id="join-box" class="hidden">
            <input type="text" id="pin-in" maxlength="4" placeholder="ENTER ROOM PIN" class="input-minimal">
            <button class="btn-minimal" onclick="initGuest()" style="background: var(--accent); color: #000; border: none;">CONNECT</button>
            <button class="btn-minimal" onclick="hideJoin()" style="border: none; color: var(--dim);">BACK</button>
        </div>
    </div>

    <div id="host-view" class="hidden">
        <div class="video-container">
            <iframe id="player-frame" src="" allow="autoplay; encrypted-media; fullscreen" sandbox="allow-scripts allow-same-origin allow-presentation allow-forms"></iframe>
            <div class="controls-bar">
                <div style="font-size: 10px; color: var(--accent); font-weight: bold; letter-spacing: 2px;">🛡️ AD-SHIELD ACTIVE</div>
                <div style="flex: 1;"></div>
                <button class="btn-minimal" style="width:auto; padding:8px 20px; border-color: var(--danger); color: var(--danger); margin:0;" onclick="skip()">SKIP NEXT ⏭️</button>
            </div>
        </div>
        <div class="sidebar">
            <div style="margin-bottom: 30px;">
                <small style="color:var(--dim); font-size: 10px;">ROOM PIN</small>
                <div id="host-pin" style="font-size: 48px; font-weight: 900; color: var(--accent);">----</div>
            </div>
            <div id="qrcode" style="background:#fff; padding:10px; border-radius:8px; display: inline-block; margin-bottom: 30px;"></div>
            <p style="font-size: 10px; color: var(--dim); text-align: left; letter-spacing: 2px;">UPCOMING QUEUE</p>
            <div id="host-q"></div>
        </div>
    </div>

    <div id="guest-view" class="hidden container">
        <div id="now-playing-guest" style="margin-bottom: 30px;">
            <img id="g-cover" src="" style="width: 100%; border-radius: 20px; margin-bottom: 15px;">
            <h3 id="g-title" style="margin: 0; font-size: 16px;">Waiting for host...</h3>
        </div>
        <input type="text" id="song-url" placeholder="Paste YouTube Link" class="input-minimal">
        <button class="btn-minimal" onclick="addSong()" style="background: var(--accent); color: #000; border: none; font-weight: bold;">ADD TO QUEUE</button>
        <p style="font-size: 10px; color: var(--dim); text-align: left; letter-spacing: 2px; margin-top: 30px;">NEXT SONGS</p>
        <div id="guest-q"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUFEmoyZKyiaiPekaw-gc-B5M5cgtW_WE",
            authDomain: "songplayer-c1058.firebaseapp.com",
            databaseURL: "https://songplayer-c1058-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let CURRENT_ROOM = "", queue = [];

        // Check Auto-Join from URL
        window.onload = () => {
            const r = new URLSearchParams(window.location.search).get('room');
            if (r) { CURRENT_ROOM = r; document.getElementById('setup').classList.add('hidden'); document.getElementById('guest-view').classList.remove('hidden'); startSync(false); }
        }

        function showJoin() { document.getElementById('main-actions').classList.add('hidden'); document.getElementById('join-box').classList.remove('hidden'); }
        function hideJoin() { document.getElementById('main-actions').classList.remove('hidden'); document.getElementById('join-box').classList.add('hidden'); }

        function initHost() {
            CURRENT_ROOM = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('host-view').classList.remove('hidden');
            document.getElementById('host-pin').innerText = CURRENT_ROOM;
            new QRCode(document.getElementById("qrcode"), { text: window.location.origin + window.location.pathname + "?room=" + CURRENT_ROOM, width: 150, height: 150 });
            startSync(true);
        }

        function initGuest() {
            CURRENT_ROOM = document.getElementById('pin-in').value;
            if(CURRENT_ROOM) { document.getElementById('setup').classList.add('hidden'); document.getElementById('guest-view').classList.remove('hidden'); startSync(false); }
        }

        function startSync(isHost) {
            db.ref('rooms/'+CURRENT_ROOM+'/queue').on('value', s => {
                const d = s.val(); 
                const newQueue = d ? Object.entries(d).map(([k, v]) => ({ k, ...v })) : [];
                if (isHost && newQueue.length > 0 && (queue.length === 0 || newQueue[0].vid !== queue[0].vid)) {
                    // Ad-Shield Embedded Player
                    document.getElementById('player-frame').src = `https://yewtu.be/embed/${newQueue[0].vid}?autoplay=1&local=true`;
                }
                queue = newQueue;
                renderQueues(isHost);
            });
        }

        function renderQueues(isHost) {
            const qHTML = queue.slice(1).map(item => `
                <div class="q-item">
                    <img src="https://img.youtube.com/vi/${item.vid}/mqdefault.jpg">
                    <div class="q-title">${item.title}</div>
                </div>
            `).join('');
            document.getElementById(isHost ? 'host-q' : 'guest-q').innerHTML = qHTML;
            if(!isHost && queue.length > 0) {
                document.getElementById('g-title').innerText = queue[0].title;
                document.getElementById('g-cover').src = `https://img.youtube.com/vi/${queue[0].vid}/mqdefault.jpg`;
            }
        }

        async function addSong() {
            const v = document.getElementById('song-url').value;
            const id = v.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if(id) {
                const r = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`);
                const d = await r.json();
                db.ref('rooms/'+CURRENT_ROOM+'/queue').push({ vid: id, title: d.title });
                document.getElementById('song-url').value = "";
            }
        }

        function skip() { if(queue.length > 0) db.ref('rooms/'+CURRENT_ROOM+'/queue/'+queue[0].k).remove(); }
    </script>
</body>
</html>
